name: Generate Top Languages Card
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download top-langs.svg
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=KaryoYou&layout=compact&hide_border=true&theme=dark&show_percent=true" -o top-langs.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add top-langs.svg
          git commit -m "Update top languages" || exit 0
          git push

name: generate top languages

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # 生成 Top Languages 卡片（成熟稳定Action，和snake一样可靠）
      - name: generate top-langs.svg
        uses: lowlighter/metrics@latest
        with:
          filename: dist/top-langs.svg
          user: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          template: classic
          plugin_languages: yes
          plugin_languages_layout: compact
          plugin_languages_details: percentage
          plugin_languages_hide_border: yes
          config_background: transparent
          config_color_scheme: dark

      # 推送到 output 分支（和你的snake代码完全一样）
      - name: push top-langs.svg to output branch
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

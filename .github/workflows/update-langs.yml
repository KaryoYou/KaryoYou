name: generate top languages

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # 1. 先手动创建 dist 目录（避免目录不存在的错误）
      - name: Prepare dist directory
        run: mkdir -p dist

      # 2. 生成 Top Languages 卡片（指定输出到 dist 目录）
      - name: generate top-langs.svg
        uses: lowlighter/metrics@latest
        with:
          filename: top-langs.svg
          output: ./  # 输出目录
          user: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          template: classic
          plugin_languages: yes
          plugin_languages_layout: compact
          plugin_languages_details: percentage
          plugin_languages_hide_border: yes
          config_background: transparent
          config_color_scheme: dark

      # 3. 推送到 output 分支（和你的 Snake 代码完全一样）
      - name: push top-langs.svg to output branch
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

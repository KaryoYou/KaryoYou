name: Static Top Languages Card
on:
  workflow_dispatch:  # 支持手动运行
  schedule:
    - cron: "0 0 * * *" # 每天自动更新一次

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须开启，否则无法提交文件
    steps:
      # 拉取你自己的仓库（仅官方Action，稳定无坑）
      - uses: actions/checkout@v4

      # 直接生成一个静态SVG文件（完全不依赖任何外部服务/API）
      - name: Generate Static SVG
        run: |
          cat > top-langs.svg << 'EOF'
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="150" viewBox="0 0 300 150">
  <rect width="300" height="150" fill="#1e1e1e" rx="5"/>
  <text x="15" y="25" fill="white" font-size="14" font-weight="bold">Top Languages</text>
  <rect x="15" y="40" width="100" height="18" fill="#3572A5" rx="3"/>
  <text x="130" y="54" fill="white" font-size="12">Python (50.0%)</text>
  <rect x="15" y="65" width="80" height="18" fill="#178600" rx="3"/>
  <text x="110" y="79" fill="white" font-size="12">C# (40.0%)</text>
  <rect x="15" y="90" width="20" height="18" fill="#F1E05A" rx="3"/>
  <text x="50" y="104" fill="white" font-size="12">JavaScript (10.0%)</text>
</svg>
EOF

      # 提交并推送文件到你的仓库
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add top-langs.svg
          git commit -m "Update static top languages card" || echo "No changes to commit"
          git push

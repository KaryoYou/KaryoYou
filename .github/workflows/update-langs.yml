name: Update Top Languages
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate langs image
        uses: Readme-Workflows/Readme-Icons@main
        with:
          lang: true
          username: KaryoYou
          filename: top-langs.svg
          theme: default
          compact: true
      - name: Save
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add top-langs.svg
          git commit -m "Update languages" || exit 0
          git push

name: Top Languages Card
on:
  workflow_dispatch:  # 手动运行
  schedule:
    - cron: "0 0 * * *" # 每日自动更新

jobs:
  update-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      # 专用Action，完美复刻github-readme-stats效果
      - uses: Readme-Workflows/top-langs-action@v1.0.0
        with:
          username: KaryoYou
          layout: compact
          theme: dark
          hide_border: true
          show_percentage: true
          output_file: top-langs.svg

      # 提交文件到仓库
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Top Languages
          file_pattern: top-langs.svg

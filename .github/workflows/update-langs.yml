name: generate commit languages

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # 创建输出目录
      - name: Create dist folder
        run: mkdir -p dist

      # 生成 【提交语言百分比卡片】（纯统计commit，无多余信息）
      - name: Generate commit language card
        uses: vn7n24t/github-profile-summary-cards@latest
        with:
          USERNAME: ${{ github.repository_owner }}
          OUTPUT: ./
          CARD_TYPE: commit_langs_card
          THEME: dark
          HIDE_BORDER: true

      # 推送到 output 分支（和你的 Snake 代码完全一样）
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
